# .mergepath-sync.yml — propagation manifest for sync-to-downstream.sh
#
# Single source of truth for which Mergepath paths are canonical
# (mirrored verbatim) or templated (mirrored with substitutions),
# and which downstream consumers opt in to each. Read by
# scripts/sync-to-downstream.sh — see #168 for the full design.
#
# Schema is deliberately small for v1 (Layer 1 + Layer 2 of the issue
# plan): manifest + audit. Additional path types and per-path knobs
# (kit-with-allowlist, three-way-merge for review-policy.yml,
# substitution rules for templated docs) land in later layers.
#
# ─────────────────────────────────────────────────────────────────────
# `requires:` — propagation closure invariant (#264)
# ─────────────────────────────────────────────────────────────────────
#
# A path entry MAY declare a `requires:` list naming OTHER paths that
# must travel with it to a consumer for the entry to function. The
# canonical motivation is the propagation wave that triggered #264:
# scripts/ci/check_gh_as_author was propagated as part of the
# scripts/ci/ kit, but the test files it hard-requires
# (tests/test_gh_pr_guard.sh, tests/test_gh_as_author.sh, etc.)
# were NOT in the manifest. Every consumer's `lint` job then
# failed in pre-flight on `Missing required file: tests/...`.
#
# The `requires:` field closes that gap structurally:
# `scripts/ci/check_sync_manifest` enforces that for every required
# path listed under any entry, that path is ALSO covered by the
# manifest. "Covered" means EITHER an exact entry of its own OR a
# path strictly inside a manifest kit entry (because kit propagation
# walks the whole directory, so a fixtures subdir under a kit path
# travels for free).
#
# Be conservative when adding `requires:` — only entries you can
# verify by grepping the actual script/workflow for hard-required
# paths. A `requires:` entry should be:
#   - a test file under tests/ that a `scripts/ci/check_*` wrapper
#     hard-fails on if missing,
#   - a script that a propagated workflow shells out to (e.g.
#     codex-p1-gate.yml → codex-p1-gate.sh), or
#   - a fixture/library path that an extracted module depends on at
#     runtime (e.g. agent-review.yml's detect-disagreement job
#     requires scripts/disagreement-detector.cjs).
#
# Things that are NOT `requires:` material:
#   - Soft dependencies (docs cross-references, comment pointers).
#   - Paths inside the SAME manifest entry's kit directory (those
#     travel automatically; declaring them is harmless and may help
#     readability, but the validator accepts them either way).
#   - Per-consumer config (e.g. .github/review-policy.yml) that is
#     intentionally NOT propagated.
#
# Format:
#   - path: scripts/ci/
#     type: kit
#     consumers: all
#     requires:
#       - "tests/test_gh_pr_guard.sh"       # check_gh_as_author
#       - "tests/test_gh_as_author.sh"      # check_gh_as_author
#       - "scripts/ci/fixtures/"            # check_disagreement_detector
#
# ─────────────────────────────────────────────────────────────────────
# Canary-first procedure for --sync-all
# ─────────────────────────────────────────────────────────────────────
#
# When propagating a large change set, prefer the canary-first pattern
# over a parallel fan-out. The propagation wave that surfaced #264
# opened 8 consumer PRs simultaneously; every one of them failed the
# same `lint` job for the same reason, so a single canary would have
# caught the gap before the fan-out blew up.
#
# Recommended steps for `scripts/sync-to-downstream.sh --sync-all`:
#   1. Pick ONE consumer (typically a public repo so the failure is
#      easy to read in a tab without auth): `--repos <one-name>`.
#   2. Wait for that consumer's PR to pass `lint`. If it fails,
#      investigate IN THE CONSUMER PR before opening any others —
#      most failures (missing test files, missing fixtures, missing
#      scripts the kit hard-requires) are upstream manifest gaps
#      that `requires:` would have caught at the manifest layer.
#   3. Once the canary is green, fan out: `--sync-all` (no `--repos`).
#   4. The remaining consumers re-use the cleared invariant, so the
#      fan-out is reduced to a verification step, not exploration.
#
# This is documentation, not enforcement — agents and humans share the
# same recommendation. The `requires:` invariant above is the
# structural guard; the canary procedure is the operational practice
# that makes a manifest gap recoverable for a single PR instead of
# eight.

# Schema version. Bumped on incompatible changes; the script refuses
# to run against an unknown version so old scripts can't silently
# misinterpret a newer manifest.
version: 1

consumers:
  - name: matchline
    repo: nathanjohnpayne/matchline
    visibility: private
  - name: nathanpaynedotcom
    repo: nathanjohnpayne/nathanpaynedotcom
    visibility: private
  - name: overridebroadway
    repo: nathanjohnpayne/overridebroadway
    visibility: private
  - name: device-source-of-truth
    repo: nathanjohnpayne/device-source-of-truth
    visibility: public
  - name: friends-and-family-billing
    repo: nathanjohnpayne/friends-and-family-billing
    visibility: public
  - name: device-platform-reporting
    repo: nathanjohnpayne/device-platform-reporting
    visibility: public
  - name: swipewatch
    repo: nathanjohnpayne/swipewatch
    visibility: public
  - name: tadlockpsychiatry
    repo: nathanjohnpayne/tadlockpsychiatry
    visibility: private

# Path types:
#   canonical  — byte-for-byte mirror. Any difference is drift.
#   kit        — directory mirror with allow-extras semantics: every
#                file under Mergepath's path must exist (byte-identical)
#                in the consumer; consumer-only files in the same dir
#                are ignored. This matches scripts/ci/, where each
#                consumer adds repo-specific check_* scripts alongside
#                the canonical ones.
#   templated  — RESERVED for Layer 5 (#168). Not yet supported by
#                --audit; scripts/sync-to-downstream.sh refuses to
#                process templated entries until the substitution
#                lib lands.
#
# `consumers: all` means every entry in the consumers list above.
# Per-consumer exclusions live under the `exclusions:` block at the
# bottom of the file.

paths:
  # Canonical scripts — Phase 4 review tooling, hooks, helpers.
  - path: scripts/op-preflight.sh
    type: canonical
    consumers: all
  # Sourced by all five GH_TOKEN-using helper scripts; carries the
  # auto-source logic that lets agents drop the explicit
  # `GH_TOKEN=...` prefix once the preflight cache is warm. See #282.
  - path: scripts/lib/preflight-helpers.sh
    type: canonical
    consumers: all
  - path: scripts/coderabbit-wait.sh
    type: canonical
    consumers: all
  - path: scripts/codex-review-request.sh
    type: canonical
    consumers: all
  - path: scripts/codex-review-check.sh
    type: canonical
    consumers: all
  - path: scripts/phase-4b-classifier.sh
    type: canonical
    consumers: all
  # Chat-side Phase 4b handoff block renderer (#281). Read-only,
  # stdout-only: emits the single-PR or batch handoff variant per
  # REVIEW_POLICY.md § Handoff Message Format § Chat-side handoff
  # block. Must travel with every consumer that runs the Phase 4b
  # workflow so the chat-side text is consistent across repos.
  - path: scripts/post-phase-4b-handoff.sh
    type: canonical
    consumers: all
  - path: scripts/codex-p1-gate.sh
    type: canonical
    consumers: all
  - path: scripts/disagreement-detector.cjs
    # Runtime dependency of .github/workflows/agent-review.yml's
    # detect-disagreement job — the job require()s this module.
    # Must sync in lockstep with the workflow. See #259.
    type: canonical
    consumers: all
  - path: scripts/resolve-pr-threads.sh
    type: canonical
    consumers: all
  - path: scripts/request-label-removal.sh
    type: canonical
    consumers: all
  - path: scripts/gh-as-author.sh
    type: canonical
    consumers: all
  - path: scripts/gh-as-reviewer.sh
    type: canonical
    consumers: all
  # Pre-action identity check (#284) — the assertion helper that every
  # WRITE-path helper script calls at the top to fail-close on
  # active-account drift. Travels with the helper scripts that depend
  # on it (coderabbit-wait, codex-review-request, resolve-pr-threads,
  # request-label-removal, gh-as-*); without this propagated, those
  # helpers' identity-check call would silently no-op (the -x test
  # would return false).
  - path: scripts/identity-check.sh
    type: canonical
    consumers: all
  - path: scripts/hooks/gh-pr-guard.sh
    type: canonical
    consumers: all
  - path: scripts/hooks/label-removal-guard.sh
    type: canonical
    consumers: all

  # Canonical tests — the suites that exercise the canonical
  # scripts/hooks above. These MUST travel with the scripts they
  # test: a consumer that runs the suite (via scripts/ci/
  # check_gh_as_author, or a repo-local check_hook_tests) against a
  # freshly-propagated canonical hook needs the matching canonical
  # test, or the test fails closed on a version mismatch. The
  # propagation wave's matchline failure (#264) was exactly this —
  # matchline carried a divergent FORK of the gh-pr-guard test that
  # drifted from the canonical hook. Pairing each script with its
  # test in the manifest closes that coupling gap.
  - path: tests/test_gh_pr_guard.sh
    type: canonical
    consumers: all
  - path: tests/test_gh_as_author.sh
    type: canonical
    consumers: all
  - path: tests/test_gh_as_reviewer.sh
    type: canonical
    consumers: all
  # Pairs with scripts/identity-check.sh (#284). The helper is called
  # from the top of every WRITE-path helper script; the test exercises
  # all four assert modes against `gh config get` shims plus an
  # `--expect-token-identity` mismatch case.
  - path: tests/test_identity_check.sh
    type: canonical
    consumers: all
  # Pairs with scripts/workflow/verify-propagation-pr.sh (under the
  # scripts/workflow/ kit below). The verifier is security-load-bearing
  # for the propagation-PR review lane; its test travels with it so a
  # consumer that runs scripts/ci/check_verify_propagation_pr exercises
  # the matching suite. See #264 / #268.
  - path: tests/test_verify_propagation_pr.sh
    type: canonical
    consumers: all
  # Pairs with scripts/codex-p1-gate.sh + scripts/ci/check_codex_p1_gate
  # (kit-propagated). The check wrapper hard-requires this test file;
  # without it propagated, every consumer's check_codex_p1_gate fails
  # in pre-flight with `Missing required file`. Same #264/#266 coupling
  # class — surfaced again by the 024e0da propagation wave (#273).
  - path: tests/test_codex_p1_gate.sh
    type: canonical
    consumers: all
  # Pairs with scripts/disagreement-detector.cjs +
  # scripts/ci/check_disagreement_detector. The check wrapper requires
  # this test file; same #264/#266 coupling class (#273).
  - path: tests/test_disagreement_detector.sh
    type: canonical
    consumers: all
  # Pairs with scripts/post-phase-4b-handoff.sh (#281). PATH-shimmed
  # gh; no live GitHub network. Travels with the helper so consumers
  # exercise the same renderer they propagate.
  - path: tests/test_post_phase_4b_handoff.sh
    type: canonical
    consumers: all
  # Pairs with scripts/op-preflight.sh + scripts/lib/preflight-helpers.sh
  # + scripts/ci/check_op_preflight_contract. The check wrapper requires
  # both test files; same coupling pattern as the gh-as-author and
  # codex-p1-gate suites above. See #282.
  - path: tests/test_op_preflight_check.sh
    type: canonical
    consumers: all
  - path: tests/test_helper_autosource.sh
    type: canonical
    consumers: all
  # Pairs with scripts/resolve-pr-threads.sh +
  # scripts/ci/check_resolve_pr_threads (which delegates to this test
  # file after its own in-suite cases). Exercises the mergepath#305
  # `[mergepath-resolve:<class>]` tag-emission flow (derive_tag_class
  # heuristics + --rationale override + --no-tag-reply). Without this
  # test propagated, every consumer's check_resolve_pr_threads
  # exits 1 on the wrapper's "missing $TAG_TEST" branch — same
  # #264/#266 coupling class as the codex-p1-gate / disagreement-
  # detector / verify-propagation-pr pairings above. See #305.
  - path: tests/test_resolve_pr_threads_rationale_tag.sh
    type: canonical
    consumers: all

  # Canonical workflows — review policy + automation surfaces that
  # should be lockstep across all consumers.
  - path: .github/workflows/agent-review.yml
    type: canonical
    consumers: all
    # The detect-disagreement job runs `require('scripts/disagreement-
    # detector.cjs')`. Without the module file, the job aborts on
    # MODULE_NOT_FOUND. Same lockstep coupling as #259 — propagate the
    # workflow without the module and every consumer's agent-review job
    # fails on the very first PR.
    requires:
      - "scripts/disagreement-detector.cjs"
  - path: .github/workflows/pr-review-policy.yml
    type: canonical
    consumers: all
    # The workflow shells out to the three scripts/workflow/ parser
    # helpers (parse_policy_list, match_protected_paths,
    # parse_manifest_paths). They are propagated as part of the
    # scripts/workflow/ kit; declaring the dependency here makes the
    # coupling explicit so the check_sync_manifest invariant flags any
    # future split of the parser kit from the workflow.
    requires:
      - "scripts/workflow/"
  - path: .github/workflows/dependabot-auto-merge.yml
    type: canonical
    consumers: all
  - path: .github/workflows/auto-clear-blocking-labels.yml
    type: canonical
    consumers: all
  - path: .github/workflows/pr-audit.yml
    type: canonical
    consumers: all
  - path: .github/workflows/codex-p1-gate.yml
    type: canonical
    consumers: all
    # The workflow's only job runs `scripts/codex-p1-gate.sh` directly
    # (see the `Run scripts/codex-p1-gate.sh` step). Propagating the
    # workflow without the script makes the gate fail-closed on
    # `command not found` for every PR in the consumer.
    requires:
      - "scripts/codex-p1-gate.sh"

  # NOTE: `.mergepath-sync.yml` is deliberately NOT propagated.
  # #268 briefly made it a canonical path on the theory the lane
  # would read it in-repo — but the lane's redesign (after the Codex
  # P1 on #268) runs verify-propagation-pr.sh from the CLONED
  # mergepath@<sha>, which carries its own authoritative manifest.
  # The consumer's copy would be unused — and worse, this file lists
  # every consumer including private repo names, so propagating it to
  # a PUBLIC consumer leaks the private inventory. Keep it
  # mergepath-only. (CodeRabbit Major, #271.)

  # Kit directories — Mergepath-canonical files are required;
  # consumer-only additions in the same directory are allowed.
  - path: scripts/ci/
    type: kit
    consumers: all
    # check_* wrappers under scripts/ci/ hard-fail (exit 1) when their
    # paired tests, scripts, workflows, or fixtures are missing. Every
    # entry below is grep-verified against a `scripts/ci/check_*`
    # script's REQUIRED_FILES / TEST / FIXTURE constants — the same
    # closure gap that surfaced as #264 on the original propagation
    # wave (check_gh_as_author missing its tests on every consumer).
    requires:
      - "tests/test_gh_pr_guard.sh"            # check_gh_as_author
      - "tests/test_gh_as_author.sh"           # check_gh_as_author
      - "tests/test_gh_as_reviewer.sh"         # check_gh_as_author
      - "tests/test_codex_p1_gate.sh"          # check_codex_p1_gate
      - "tests/test_disagreement_detector.sh"  # check_disagreement_detector
      - "tests/test_verify_propagation_pr.sh"  # check_verify_propagation_pr
      - "tests/test_resolve_pr_threads_rationale_tag.sh"  # check_resolve_pr_threads (delegated test)
      - "scripts/codex-p1-gate.sh"             # check_codex_p1_gate
      - "scripts/codex-review-request.sh"      # check_codex_scripts
      - "scripts/codex-review-check.sh"        # check_codex_scripts, check_canonical_bugs_263caf3
      - "scripts/phase-4b-classifier.sh"       # check_phase_4b_classifier
      - "scripts/disagreement-detector.cjs"    # check_disagreement_detector
      - "scripts/request-label-removal.sh"     # check_canonical_bugs_263caf3
      - "scripts/resolve-pr-threads.sh"        # check_resolve_pr_threads
      - "scripts/gh-as-author.sh"              # check_gh_as_author (transitive)
      - "scripts/gh-as-reviewer.sh"            # check_gh_as_author (transitive)
      - "scripts/hooks/gh-pr-guard.sh"         # tests/test_gh_pr_guard.sh runs it
      - "scripts/workflow/"                    # check_workflow_parsers
      - ".github/workflows/agent-review.yml"   # check_disagreement_detector structural assertion
      - ".github/workflows/codex-p1-gate.yml"  # check_codex_p1_gate workflow shape
      - ".github/workflows/pr-audit.yml"       # check_pr_audit_codex_clearance
  - path: scripts/gh-projects/
    type: kit
    consumers: all
  # scripts/workflow/ — the awk/bash parser helpers the canonical
  # .github/workflows/ files shell out to (parse_policy_list,
  # match_protected_paths, parse_manifest_paths). These were already
  # present in consumers (seeded at bootstrap) but UNTRACKED by this
  # manifest — a latent #264-class drift gap, since pr-review-policy.yml
  # is canonical and depends on them. Tracking the directory as kit
  # keeps the workflow and its helpers in lockstep.
  - path: scripts/workflow/
    type: kit
    consumers: all

# Per-consumer exclusions. Use sparingly — drift exceptions become
# audit noise over time. Each entry must list a `reason:` so future
# readers know whether the exclusion is still load-bearing.
exclusions: []
