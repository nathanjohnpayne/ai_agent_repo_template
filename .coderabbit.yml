# .coderabbit.yml — CodeRabbit configuration
# See https://docs.coderabbit.ai/configuration

language: en-US

tone_instructions: >-
  Focus on bugs, security issues, and correctness over style nitpicks.
  Flag any hardcoded credentials, exposed API keys, or secrets.
  Keep comments actionable and concise.

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # profile: chill (the default) suppresses 🧹 Nitpick comments entirely
  # — per CodeRabbit's docs, the Nitpick category is "only in Assertive
  # mode". The 2026-05-13 sweep (#234) surfaced 56 unresolved nit threads
  # across 9 repos, none of which represented substantive findings; the
  # validation pass (#236) classified most as ALREADY-FIXED or
  # cosmetic. Switching to chill keeps substantive findings (Potential
  # issue / ⚠️ / Refactor / Security) while removing the per-thread
  # nit ceremony. See #237 for the full rationale and links to the
  # supporting audit data. Override per-repo by setting
  # profile: assertive locally if a repo wants the polish pass.
  profile: chill
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: true
  collapse_walkthrough: true
  poem: false

  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true

  path_instructions:
    - path: "scripts/**"
      instructions: >-
        Review shell scripts for safety: unquoted variables, missing error
        handling (set -euo pipefail), command injection risks, and
        cross-platform portability issues.
    - path: "docs/**"
      instructions: >-
        Check documentation for accuracy against the actual scripts and
        configuration it describes. Flag stale references.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
