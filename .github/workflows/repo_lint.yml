name: repo-lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: make_ci_scripts_executable
        run: chmod +x scripts/ci/*

      # Structural guard added in #269: every executable
      # scripts/ci/check_* must be wired into this workflow as an
      # explicit `run: ./scripts/ci/check_X` step (or carry a
      # documented exemption comment). Catches the failure mode where
      # a check ships on disk but never executes in CI because nobody
      # remembered to add the matching workflow step. Pure-bash so it
      # can run before any tooling install (yq, etc.).
      - name: check_ci_scripts_wired
        run: ./scripts/ci/check_ci_scripts_wired

      - name: check_required_root_files
        run: ./scripts/ci/check_required_root_files

      - name: check_no_tool_folder_instructions
        run: ./scripts/ci/check_no_tool_folder_instructions

      - name: check_no_forbidden_top_level_dirs
        run: ./scripts/ci/check_no_forbidden_top_level_dirs

      - name: check_dist_not_modified
        run: ./scripts/ci/check_dist_not_modified

      - name: check_spec_test_alignment
        run: ./scripts/ci/check_spec_test_alignment

      - name: check_duplicate_docs
        run: ./scripts/ci/check_duplicate_docs

      # Bootstrap-wizard test suites (#156). Each check_bootstrap_*
      # script wraps the matching tests/test_bootstrap_*.sh suite
      # that exercises the corresponding bootstrap sub-wizard so the
      # wizards stay reproducible and a regression in any sub-wizard
      # is caught in CI before it ships to consumer repos. Wired in
      # #269 after the inventory of unwired scripts/ci/check_*.
      - name: check_bootstrap_wizard
        # Sub-A: top-level bootstrap wizard scaffolding + flow.
        run: ./scripts/ci/check_bootstrap_wizard

      - name: check_bootstrap_template_mirror
        # Sub-B: template-mirror bootstrap that seeds a downstream
        # repo with the canonical mergepath template files.
        run: ./scripts/ci/check_bootstrap_template_mirror

      - name: check_bootstrap_github_infra
        # Sub-C: GitHub infrastructure bootstrap (labels, branch
        # protection, required workflows) for a fresh consumer repo.
        run: ./scripts/ci/check_bootstrap_github_infra

      - name: check_bootstrap_firebase_and_codereview
        # Sub-D: Firebase + code-review configuration bootstrap.
        # Validates the wizard correctly disables CodeRabbit for
        # private consumer repos (free tier is public-only).
        run: ./scripts/ci/check_bootstrap_firebase_and_codereview

      - name: check_bootstrap_board_and_summary
        # Sub-E: Project board + bootstrap-summary generation.
        # Ensures the wizard's end-state artifacts stay in sync with
        # the canonical templates.
        run: ./scripts/ci/check_bootstrap_board_and_summary

      - name: check_review_policy_exists
        run: |
          MISSING=0
          if [ ! -f ".github/review-policy.yml" ]; then
            echo "ERROR: .github/review-policy.yml is missing"
            MISSING=1
          fi
          if [ ! -f "REVIEW_POLICY.md" ]; then
            echo "ERROR: REVIEW_POLICY.md is missing"
            MISSING=1
          fi
          exit $MISSING

      # WIRED-EXEMPT: check_op_firebase_deploy_integration — opt-in
      # local-only resolver smoke test for `scripts/firebase/op-firebase-deploy`
      # (#211). Gated on MERGEPATH_RUN_INTEGRATION=1 in the script's
      # own header; defaults to SKIPPED + exit 0 so wiring it into
      # repo_lint.yml would just add a SKIPPED step. The check_ci_scripts_wired
      # exemption keeps it executable on disk (so operators can run it
      # locally with the env var) without requiring a no-op CI step.
      # See #289 r4 / #290 / #269 — nathanpayne-codex Phase 4b finding.

      - name: check_codex_scripts
        run: ./scripts/ci/check_codex_scripts

      - name: check_daily_feedback_rollup
        # Pure-function helpers + a 3-case shimmed --dry-run smoke
        # over scripts/daily-feedback-rollup.sh (#299 v1 slice).
        # Hermetic — uses a gh stub + canned GraphQL fixture; no
        # network. The full rollup integration (actually firing the
        # workflow against live PRs) is exercised once daily via
        # the cron in .github/workflows/daily-feedback-rollup.yml.
        run: ./scripts/ci/check_daily_feedback_rollup

      - name: check_canonical_bugs_263caf3
        # Regression coverage for two nathanpayne-codex Phase 4b
        # findings on the 263caf3 propagation wave:
        #   - request-label-removal.sh set -e abort in no-`--repo` path
        #   - codex-review-check.sh self-approval hole via
        #     same-agent reviewer identity bypassing the author
        #     exclusion in gate (b) + gate (c) Phase 4b substitute
        run: ./scripts/ci/check_canonical_bugs_263caf3

      - name: check_workflow_parsers
        run: ./scripts/ci/check_workflow_parsers

      # check_verify_propagation_pr exercises the faithful-mirror
      # verifier (scripts/workflow/verify-propagation-pr.sh) that is
      # the security teeth of the propagation-PR review lane — it is
      # what makes it safe for that lane to skip Phase 4 external
      # review. repo_lint.yml enumerates checks explicitly, so a
      # check on disk that is not listed here never runs in CI; this
      # step wires the verifier suite in so it cannot rot or vanish
      # silently. Codex CHANGES_REQUESTED on #268 caught the gap.
      - name: check_verify_propagation_pr
        run: ./scripts/ci/check_verify_propagation_pr

      - name: check_phase_4b_classifier
        run: ./scripts/ci/check_phase_4b_classifier

      - name: check_codex_p1_gate
        run: ./scripts/ci/check_codex_p1_gate

      - name: check_resolve_pr_threads
        run: ./scripts/ci/check_resolve_pr_threads

      - name: check_gh_as_author
        run: ./scripts/ci/check_gh_as_author

      - name: check_op_preflight_contract
        run: ./scripts/ci/check_op_preflight_contract

      - name: check_eslint_config_present
        run: ./scripts/ci/check_eslint_config_present

      - name: check_eslint_config_policy
        run: ./scripts/ci/check_eslint_config_policy

      - name: check_auto_clear_workflow
        run: ./scripts/ci/check_auto_clear_workflow

      - name: check_pr_audit_codex_clearance
        run: ./scripts/ci/check_pr_audit_codex_clearance

      - name: check_sweep_unresolved_feedback
        run: ./scripts/ci/check_sweep_unresolved_feedback

      - name: check_disagreement_detector
        run: ./scripts/ci/check_disagreement_detector

      - name: install_yq_for_sync_manifest
        # mikefarah/yq is needed by check_sync_manifest. Pin a recent v4
        # release; bumped opportunistically. The official ubuntu-latest
        # runner ships yq 4.x preinstalled today, but pinning makes the
        # check resilient to runner image changes.
        run: |
          if command -v yq >/dev/null 2>&1 && yq --version 2>&1 | grep -q "mikefarah/yq"; then
            echo "yq already present: $(yq --version)"
          else
            sudo wget -q -O /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
            yq --version
          fi

      - name: check_sync_manifest
        run: ./scripts/ci/check_sync_manifest

      - name: check_sync_overrides
        # Exercises tests/test_sync_overrides.sh — verifies the
        # per-consumer sync override semantics (#200) so a downstream
        # repo can opt files out of the propagation lane without the
        # mirror lane silently re-overwriting them.
        run: ./scripts/ci/check_sync_overrides

      - name: check_coderabbit_config
        # Validates the template-level .coderabbit.yml stays on the
        # nit-suppressing profile (chill). Shares the yq install with
        # check_sync_manifest above. See #237 for the rationale.
        #
        # Scope (per Codex P2 on #256): the profile=chill enforcement
        # only runs when the executing repo is the Mergepath template
        # itself, detected via GITHUB_REPOSITORY (always set by Actions).
        # Consumer repos that inherit this workflow via the template-
        # mirror bootstrap still get the YAML parse + file-existence
        # checks but are free to set reviews.profile: assertive locally
        # without their CI failing.
        run: ./scripts/ci/check_coderabbit_config

      - name: check_coderabbit_config_tests
        # Unit tests for check_coderabbit_config itself — covers the
        # template-vs-consumer detection logic and the assertion paths
        # added by #256 P2.
        run: ./scripts/ci/check_coderabbit_config_tests

      - name: check_mktemp_portability
        # Regression guard for mergepath#286. Hard-fails on any
        # tracked shell file using the BSD-only `mktemp -t <prefix>`
        # form, which GNU coreutils mktemp rejects (XXXXXX required).
        # Closes the re-introduction surface that the closed-review
        # backlog sweep on #286 caught.
        run: ./scripts/ci/check_mktemp_portability

      - name: check_governance_files
        run: |
          MISSING=0
          for file in SECURITY.md .github/CODEOWNERS .github/dependabot.yml; do
            if [ ! -f "$file" ]; then
              echo "ERROR: $file is missing"
              MISSING=1
            fi
          done
          exit $MISSING
